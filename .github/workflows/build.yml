name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Regenerate icons
        run: npm run icons

      - name: Build renderer
        run: npm run build

      # Sanity-check the Electron main-process files parse.
      - name: Check main process
        run: |
          node --check electron/main.js
          node --check electron/preload.js
          node --check electron/dolibarr.js
          node --check electron/store.js
          node --check electron/settings.js
